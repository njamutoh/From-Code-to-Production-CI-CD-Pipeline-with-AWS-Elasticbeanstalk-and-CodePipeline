version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo Installing dependencies...
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo Running unit tests...
      - pytest tests/ -v

  build:
    commands:
      - echo Build stage - packaging application...
      - zip -r novamed-app.zip . -x "*.git*" -x "__pycache__/*" -x "*.pyc"

  post_build:
    commands:
      - echo Build complete. Package ready for deployment.

artifacts:
  files:
    - "**/*"
  discard-paths: no
